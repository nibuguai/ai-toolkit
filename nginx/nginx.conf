worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ==================== Gzip 压缩 ====================
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # ==================== 上传大小限制 ====================
    client_max_body_size 50m;

    # ==================== 主服务 ====================
    server {
        listen 80;
        server_name localhost;

        # ---------- 移动端 H5 ----------
        location / {
            root /usr/share/nginx/html/mobile;
            index index.html;
            try_files $uri $uri/ /index.html;

            # HTML 不缓存（SPA 路由需要最新版本）
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }

            # 静态资源长期缓存（Vite 打包后文件名带 hash）
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ---------- 管理后台 ----------
        location /admin {
            alias /usr/share/nginx/html/admin;
            index index.html;
            try_files $uri $uri/ /admin/index.html;

            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ---------- API 转发到 SpringBoot ----------
        location /admin-api/ {
            proxy_pass http://doc-springboot:8180/admin-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # SSE 流式响应支持
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        location /app-api/ {
            proxy_pass http://doc-springboot:8180/app-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ---------- WebSocket 转发 ----------
        location /ws/ {
            proxy_pass http://doc-springboot:8180/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ---------- Swagger API 文档 ----------
        location /doc.html {
            proxy_pass http://doc-springboot:8180/doc.html;
            proxy_set_header Host $host;
        }

        location /webjars/ {
            proxy_pass http://doc-springboot:8180/webjars/;
        }

        location /v3/api-docs/ {
            proxy_pass http://doc-springboot:8180/v3/api-docs/;
        }

        # ---------- Actuator 监控（可选，按需开放） ----------
        # location /actuator/ {
        #     proxy_pass http://doc-springboot:8180/actuator/;
        #     allow 127.0.0.1;
        #     deny all;
        # }

        # ---------- 安全头 ----------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ---------- 错误页面 ----------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
