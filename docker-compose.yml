version: '3.8'

# ============================================================
#  AI Toolkit 应用层
#  依赖共享基础设施（infra/docker-compose.yml）
#  先启动 infra，再启动本文件
# ============================================================

services:

  # ==================== 业务中枢 ====================

  doc-springboot:
    build:
      context: ./backend-java
      dockerfile: yudao-server/Dockerfile
    container_name: doc-springboot
    ports:
      - "127.0.0.1:8180:8180"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-root123}
      - MINIO_ENDPOINT=http://shared-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - VISION_SERVICE_URL=http://doc-fastapi-vision:8181
    networks:
      - shared-net
    depends_on:
      doc-fastapi-vision:
        condition: service_healthy
    restart: unless-stopped

  # ==================== AI 计算层 ====================

  doc-fastapi-vision:
    build:
      context: ./services/vision-service
      dockerfile: Dockerfile
    container_name: doc-fastapi-vision
    ports:
      - "127.0.0.1:8181:8181"
    networks:
      - shared-net
    volumes:
      - model-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== 反向代理 ====================

  doc-nginx:
    image: nginx:alpine
    container_name: doc-nginx
    ports:
      - "127.0.0.1:8880:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/html:/usr/share/nginx/html
      - ./frontend/mobile/dist/build/h5:/usr/share/nginx/html/mobile
      # admin 前端构建后取消注释
      # - ./frontend/admin/dist:/usr/share/nginx/html/admin
    networks:
      - shared-net
    depends_on:
      - doc-springboot
    restart: unless-stopped

# ==================== 网络 ====================

networks:
  shared-net:
    external: true

# ==================== 数据卷 ====================

volumes:
  model-cache:
    name: doc-model-cache
