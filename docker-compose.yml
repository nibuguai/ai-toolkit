version: '3.8'

# ============================================================
#  Phase 0 Demo 最小容器集（4 个）
#  完整部署方案见《Docker 部署总览文档》
# ============================================================

services:

  # ==================== 反向代理 ====================

  doc-nginx:
    image: nginx:alpine
    container_name: doc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend-java/yudao-ui/yudao-ui-admin-uniapp/dist/build/h5:/usr/share/nginx/html/mobile:ro
      - ./backend-java/yudao-ui/yudao-ui-admin-vue3/dist:/usr/share/nginx/html/admin:ro
    networks:
      - frontend
    depends_on:
      - doc-springboot
    restart: unless-stopped

  # ==================== 业务中枢 ====================

  doc-springboot:
    build:
      context: ./backend-java
      dockerfile: yudao-server/Dockerfile
    container_name: doc-springboot
    ports:
      - "48080:48080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - MINIO_ENDPOINT=http://doc-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - VISION_SERVICE_URL=http://doc-fastapi-vision:8001
    networks:
      - frontend
      - backend
    depends_on:
      - doc-minio
      - doc-fastapi-vision
    restart: unless-stopped

  # ==================== AI 计算层 ====================

  doc-fastapi-vision:
    build:
      context: ./services/vision-service
      dockerfile: Dockerfile
    container_name: doc-fastapi-vision
    ports:
      - "8001"
    networks:
      - backend
    volumes:
      - model-cache:/root/.cache
    # GPU 开发环境注释掉，上线解开
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== 基础设施 ====================

  doc-minio:
    image: minio/minio
    container_name: doc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

# ==================== 网络 ====================

networks:
  frontend:
    name: doc-frontend
    driver: bridge
  backend:
    name: doc-backend
    driver: bridge

# ==================== 数据卷 ====================

volumes:
  minio-data:
    name: doc-minio-data
  model-cache:
    name: doc-model-cache
