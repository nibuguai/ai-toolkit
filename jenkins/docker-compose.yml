version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: jenkins-custom:latest
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "0.0.0.0:5050:8080"
      - "50000:50000"
    volumes:
      # Jenkins 数据持久化（复用原有数据卷）
      - jenkins_home:/var/jenkins_home
      # 挂载 Docker Socket，让 Jenkins 能控制宿主机 Docker
      - /var/run/docker.sock:/var/run/docker.sock
      # 挂载宿主机 docker 命令（备用，容器内已安装 CLI）
      - /usr/bin/docker:/usr/bin/docker:ro
      # 挂载项目目录
      - /mnt/g/ai-toolkit:/var/jenkins_home/workspace/ai-toolkit
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true

volumes:
  jenkins_home:
    external: true
