version: '3.8'

services:
  jenkins:
    image: jenkins-custom:latest
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "0.0.0.0:5050:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # Docker CLI 已在镜像中安装，无需挂载
      # 关键：容器内路径和宿主机路径保持一致，docker compose 相对路径才能正确解析
      - /home/deploy/ai-toolkit:/home/deploy/ai-toolkit
    extra_hosts:
      - "github.com:172.28.80.1"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
      - TZ=Asia/Shanghai
      - GIT_SSL_NO_VERIFY=1

volumes:
  jenkins_home:
    external: true
