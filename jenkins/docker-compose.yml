version: '3.8'

services:
  jenkins:
    image: jenkins-custom:latest
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "0.0.0.0:5050:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /mnt/g/ai-toolkit:/var/jenkins_home/workspace/ai-toolkit
    # 映射 github.com 到 Windows 宿主机 IP（Watt Toolkit 代理）
    extra_hosts:
      - "github.com:172.28.80.1"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
      - TZ=Asia/Shanghai
      # Watt Toolkit 代理使用自签名证书，需要跳过 SSL 验证
      - GIT_SSL_NO_VERIFY=1

volumes:
  jenkins_home:
    external: true
