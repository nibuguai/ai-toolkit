server:
  port: 8180

--- #################### 数据库相关配置 ####################
spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration
  datasource:
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 100
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      druid:
        initial-size: 1
        min-idle: 1
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 600000
        max-evictable-idle-time-millis: 1800000
        validation-query: SELECT 1 FROM DUAL
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
      primary: master
      datasource:
        master:
          url: jdbc:mysql://shared-mysql:3306/ai_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: root
          password: ${MYSQL_PASSWORD:root123}
        slave:
          lazy: true
          url: jdbc:mysql://shared-mysql:3306/ai_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&nullCatalogMeansCurrent=true
          username: root
          password: ${MYSQL_PASSWORD:root123}

  data:
    redis:
      host: shared-redis
      port: 6379
      database: 0

--- #################### 定时任务相关 ####################
xxl:
  job:
    enabled: false

--- #################### 消息队列 ####################
rocketmq:
  name-server: 127.0.0.1:9876

spring:
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: rabbit
    password: rabbit
  kafka:
    bootstrap-servers: 127.0.0.1:9092

--- #################### 服务保障 ####################
lock4j:
  acquire-timeout: 3000
  expire: 30000

--- #################### 监控 ####################
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: '*'

spring:
  boot:
    admin:
      client:
        url: http://127.0.0.1:${server.port}/${spring.boot.admin.context-path}
        instance:
          service-host-type: IP
        username: admin
        password: admin
      context-path: /admin

logging:
  file:
    name: ${user.home}/logs/${spring.application.name}.log
  level:
    cn.iocoder.yudao.module.system.dal.mysql: debug
    cn.iocoder.yudao.module.infra.dal.mysql: debug
    cn.iocoder.yudao.module.ai.dal.mysql: debug

debug: false

--- #################### 微信 ####################
wx:
  mp:
    app-id: ${WX_MP_APP_ID:your-wx-mp-app-id}
    secret: ${WX_MP_SECRET:your-wx-mp-secret}
    config-storage:
      type: RedisTemplate
      key-prefix: wx
      http-client-type: HttpClient
  miniapp:
    appid: ${WX_MINIAPP_APPID:your-wx-miniapp-appid}
    secret: ${WX_MINIAPP_SECRET:your-wx-miniapp-secret}
    config-storage:
      type: RedisTemplate
      key-prefix: wa
      http-client-type: HttpClient

--- #################### 宇擎 ####################
yudao:
  captcha:
    enable: true
  security:
    mock-enable: false
  access-log:
    enable: false
  demo: false

justauth:
  enabled: true
  type:
    DINGTALK:
      client-id: ${DINGTALK_CLIENT_ID:your-dingtalk-client-id}
      client-secret: ${DINGTALK_CLIENT_SECRET:your-dingtalk-client-secret}
      ignore-check-redirect-uri: true
    WECHAT_ENTERPRISE:
      client-id: ${WX_CORP_CLIENT_ID:your-wx-corp-client-id}
      client-secret: ${WX_CORP_CLIENT_SECRET:your-wx-corp-client-secret}
      agent-id: 1000004
      ignore-check-redirect-uri: true
    WECHAT_MINI_PROGRAM:
      client-id: ${wx.miniapp.appid}
      client-secret: ${wx.miniapp.secret}
      ignore-check-redirect-uri: true
      ignore-check-state: true
    WECHAT_MP:
      client-id: ${wx.mp.app-id}
      client-secret: ${wx.mp.secret}
      ignore-check-redirect-uri: true
    ALIPAY:
      client-id: xx
      client-secret: xx
      alipay-public-key: xx
      ignore-check-redirect-uri: true
      ignore-check-state: true
  cache:
    type: REDIS
    prefix: 'social_auth_state:'
    timeout: 24h

pf4j:
  pluginsDir: ../plugins
